</head>
<body>
    
<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="avatar-wrap">
      <!-- Replace src with actual photo path when ready -->
      <img src="" alt="Hailey Lovejoy" id="profilePhoto" />
      <span class="avatar-initials" id="avatarInitials">HL</span>
    </div>
    <h1>Hailey Lovejoy</h1>
    <p class="hero-sub">Licensed Cosmetologist &nbsp;·&nbsp; Austin, MN</p>
    <a href="tel:5075550000" class="phone-pill">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      (507) 555-0000
    </a>
  </div>
</div>
 
<!-- MY WORK -->
<div class="divider"><span>My work</span></div>
<div class="gallery-section">
  <div class="gallery">
    <div class="photo-slot empty">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <div class="photo-slot empty">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <div class="photo-slot empty">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <div class="photo-slot empty">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <div class="photo-slot empty">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <div class="photo-slot empty">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
  </div>
</div>
 
<!-- BOOKING FORM -->
<div class="divider"><span>Book with me</span></div>
<div class="booking-section">
  <div class="form-card">
 
    <div id="formWrap">
      <div class="field">
        <label for="clientName">Your name</label>
        <input type="text" id="clientName" placeholder="First and last name" autocomplete="name" />
      </div>
 
      <div class="field">
        <label for="clientPhone">Phone number</label>
        <input type="tel" id="clientPhone" placeholder="(507) 555-0000" autocomplete="tel" />
      </div>
 
      <div class="field">
        <label for="service">Service</label>
        <div class="select-wrap">
          <select id="service">
            <option value="" disabled selected>Select a service...</option>
            <option>Haircut</option>
            <option>Color</option>
            <option>Highlights / balayage</option>
            <option>Blowout / style</option>
            <option>Perm</option>
            <option>Treatment</option>
            <option>Other</option>
          </select>
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
 
      <div class="field">
        <label for="notes">Anything else? <span style="font-weight:300;text-transform:none;letter-spacing:0;">(optional)</span></label>
        <textarea id="notes" placeholder="Preferred days, times, or anything I should know..."></textarea>
      </div>
 
      <button class="submit-btn" onclick="submitForm()">Request appointment</button>
      <p class="form-note">I'll reach out to confirm your appointment!</p>
    </div>
 
    <div class="success-msg" id="successMsg">
      <div class="check">
        <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h3>You're all set!</h3>
      <p>Hailey will reach out soon to confirm your appointment.</p>
    </div>
 
  </div>
</div>
 
<footer>Hailey Lovejoy &copy; 2026</footer>
 
<script src="home.js"></script>
</body>
</html>
